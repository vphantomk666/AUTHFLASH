<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTHFLOW</title>
<link rel="icon" href="/static/image/favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  margin: 0;
  height: 100vh;
  background: #f3f4f6;
  font-family: Arial;
}

.container {
  width: 350px;
  padding: 30px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.icon-circle {
  width: 70px;
  height: 70px;
  background: #d1e7e5;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
}

.icon-circle i {
  font-size: 24px;
  color: #2d7d74;
}

.otp-container {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 15px;
}

.otp-input {
  width: 40px;
  height: 45px;
  text-align: center;
  font-size: 18px;
  border: 1px solid #ddd;
  border-radius: 8px;
}

.input-box {
  position: relative;
  margin-bottom: 15px;
  margin-top: 10px;
}

.input-box input {
  width: 93%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  background: #2d7d74;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}

.btn-secondary {
  background: #ccc;
  color: black;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="icon-circle">
    <i class="fa fa-key"></i>
  </div>

  <h2>Reset Password</h2>

  <!-- OTP BOXES -->
  <div class="otp-container">
    <input maxlength="1" class="otp-input">
    <input maxlength="1" class="otp-input">
    <input maxlength="1" class="otp-input">
    <input maxlength="1" class="otp-input">
    <input maxlength="1" class="otp-input">
    <input maxlength="1" class="otp-input">
  </div>

  <p id="timer">Resend OTP in 60s</p>
  <button id="resendBtn" class="btn btn-secondary" disabled onclick="resendOTP()">Resend OTP</button>

  <!-- PASSWORD -->
  <div class="input-box">
    <input id="new_password" type="password" placeholder="New Password">
  </div>

  <button class="btn" onclick="resetPassword()">Submit</button>

</div>

<script>
const inputs = document.querySelectorAll(".otp-input");
const email = localStorage.getItem("reset_email");

// 🔥 Check email
if (!email) {
  alert("Session expired");
  window.location.href = "/request-otp";
}

// AUTO FOCUS
inputs.forEach((input, i) => {
  input.addEventListener("input", () => {
    if (input.value && i < 5) inputs[i+1].focus();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "Backspace" && !input.value && i > 0) {
      inputs[i-1].focus();
    }
  });
});

// GET OTP
function getOTP() {
  return [...inputs].map(i => i.value).join("");
}

// TIMER
let time = 60;
const timer = document.getElementById("timer");
const resendBtn = document.getElementById("resendBtn");

const interval = setInterval(() => {
  time--;
  timer.innerText = `Resend OTP in ${time}s`;

  if (time <= 0) {
    clearInterval(interval);
    resendBtn.disabled = false;
    timer.innerText = "Resend OTP";
  }
}, 1000);

// RESEND
async function resendOTP() {
  resendBtn.disabled = true;

  await fetch("/request-otp", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email })
  });

  alert("OTP resent");
}

// RESET
async function resetPassword() {
  const otp = getOTP();
  const new_password = document.getElementById("new_password").value;

  if (otp.length < 6) {
    alert("Enter full OTP");
    return;
  }

  const res = await fetch("/reset-password", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, otp, new_password })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Password reset successful");
    localStorage.removeItem("reset_email");
    window.location.href = "/login";
  } else {
    alert(data.detail);
  }
}
</script>

</body>
</html>
