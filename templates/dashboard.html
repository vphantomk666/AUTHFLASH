<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUTHFLOW</title>
<link rel="icon" href="/static/image/favicon.svg">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body {
  margin: 0;
  height: 100vh;
  background: #f3f4f6;
  font-family: Arial;
}

/* CARD */
.container {
  width: 350px;
  padding: 30px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);

  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* ICON */
.icon-circle {
  width: 70px;
  height: 70px;
  background: #d1e7e5;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 15px;
}

.icon-circle i {
  color: #2d7d74;
  font-size: 24px;
}

/* INFO ROW */
.info {
  text-align: left;
  margin-top: 15px;
}

.info-item {
  display: flex;
  align-items: center;
  margin: 10px 0;
}

.info-item i {
  width: 25px;
  color: #2d7d74;
}

.status {
  color: green;
  font-weight: bold;
}

/* BUTTON */
.btn {
  width: 100%;
  padding: 12px;
  border: none;
  background: #2d7d74;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

  <div class="icon-circle">
    <i class="fa fa-user"></i>
  </div>

  <h2>Dashboard</h2>
  <p>Welcome back 👋</p>

  <div class="info">

    <div class="info-item">
      <i class="fa fa-user"></i>
      <span>{{ user.name }}</span>
    </div>

    <div class="info-item">
      <i class="fa fa-envelope"></i>
      <span>{{ user.email }}</span>
    </div>

    <div class="info-item">
      <i class="fa fa-clock"></i>
      <span>{{ user.last_login }}</span>
    </div>

    <div class="info-item">
      <i class="fa fa-lock"></i>
      <span>{{ user.status }}</span>
    </div>

  </div>

  <button class="btn" onclick="logout()">Logout</button>

</div>
<script>
    function logout(){
        window.location.href = "/logout"
    }
</script>


</body>
</html><!DOCTYPE html>
